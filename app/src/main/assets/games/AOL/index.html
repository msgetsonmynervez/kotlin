<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armor of Light</title>
<style>
  body {
    background-color: #0d0d1a;
    color: #e8dcc8;
    font-family: 'Palatino Linotype', 'Book Antiqua', 'Georgia', serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    -webkit-user-select: none;
    user-select: none;
  }

#game-wrapper {
background-color: #0d0d1a;
width: 100%;
max-width: 420px;
height: 100vh;
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
position: relative;
}

.screen {
flex: 1;
display: flex;
flex-direction: column;
padding: 16px;
box-sizing: border-box;
}

.hidden { display: none !important; }

h1 {
color: #FFD700;
margin-bottom: 0;
font-size: 2rem;
text-shadow: 2px 2px 0px #8B6914, 0 0 20px rgba(255,215,0,0.3);
animation: titleFloat 3s ease-in-out infinite;
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-6px); }
}

h2.header-title { margin: 0; color: #FFD700; }

/* Health Bars */
.health-bar-container {
width: 100%;
height: 22px;
background-color: #1a1a2e;
border: 2px solid #8B7355;
border-radius: 12px;
margin-bottom: 6px;
overflow: hidden;
}
#player-hp-fill, #enemy-hp-fill {
height: 100%;
background-color: #66cc66;
width: 100%;
transition: width 0.3s ease-out;
}

/* Grace Container */
#spoon-container {
display: flex;
gap: 5px;
padding: 8px 10px;
background-color: #1a1a2e;
border: 2px solid #8B7355;
border-radius: 14px;
margin-bottom: 8px;
transition: border-color 0.3s, box-shadow 0.3s;
}
.spoon-icon {
width: 20px;
height: 20px;
background-color: #FFD700;
border-radius: 50%;
transition: opacity 0.2s, transform 0.2s;
}
.spoon-icon.empty {
opacity: 0.15;
background-color: #8B7355;
}

/* Status HUD */
#status-hud {
display: flex;
gap: 5px;
padding: 4px 8px;
min-height: 24px;
margin-bottom: 6px;
flex-wrap: wrap;
align-items: center;
}
.status-badge {
display: inline-flex;
align-items: center;
gap: 3px;
background-color: #1a1a2e;
border: 2px solid #8B7355;
border-radius: 10px;
padding: 2px 7px;
font-size: 0.75rem;
font-weight: bold;
animation: statusPulse 1.5s infinite;
}
.status-badge .status-emoji { font-size: 0.9rem; }
.status-badge .status-turns { font-size: 0.7rem; opacity: 0.7; }
@keyframes statusPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}

/* Rage */
#rage-indicator {
display: none;
text-align: center;
font-size: 0.7rem;
font-weight: bold;
color: #CC3333;
padding: 2px 0;
animation: ragePulse 0.8s infinite;
}
@keyframes ragePulse {
0%, 100% { opacity: 1; text-shadow: 0 0 4px #CC3333; }
50% { opacity: 0.6; text-shadow: 0 0 12px #CC3333; }
}

/* Reward Banner */
#reward-banner {
display: none;
text-align: center;
font-size: 0.65rem;
color: #FFD700;
padding: 4px;
border: 1px dashed #FFD700;
border-radius: 8px;
margin-bottom: 6px;
background-color: rgba(255,215,0,0.05);
}

/* Animations */
@keyframes shake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-3px,0)} 40%{transform:translate(3px,-2px)} 60%{transform:translate(-3px,2px)} 80%{transform:translate(3px,0)} }
.shake { animation: shake 0.4s; }
@keyframes damageFlash { 0%{background-color:#FFD700} 100%{background-color:#66cc66} }
.flash-hp { animation: damageFlash 0.4s ease-out; }
@keyframes popSpoon { 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:0.9} 100%{transform:scale(1);opacity:0.15} }
.just-spent { animation: popSpoon 0.4s ease-out forwards; }
@keyframes lowEnergyFlicker { 0%,100%{box-shadow:0 0 5px #FFD700} 50%{box-shadow:0 0 20px #CC3333;border-color:#CC3333} }
.low-energy { animation: lowEnergyFlicker 1.2s infinite; }
.star-refill { animation: starRefill 0.5s ease-out; }
@keyframes starRefill { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.5);opacity:1} 100%{transform:scale(1);opacity:1} }

/* Status effect CSS */
@keyframes maskGlitch { 0%,100%{opacity:1;filter:contrast(1)} 50%{opacity:0.8;filter:contrast(1.5) hue-rotate(15deg)} }
.masked-bar { background-color:#FFEA00 !important; width:100% !important; animation:maskGlitch 0.5s infinite; }
.masked-spoon { opacity:1 !important; background-color:#FFEA00 !important; animation:maskGlitch 0.5s infinite; }
.masked-container { border-color:#FFEA00 !important; box-shadow:0 0 10px #FFEA00; }
.blurred-ui { filter: blur(5px) brightness(1.2); }
@keyframes buzz { 0%,100%{transform:translate(1px,1px) rotate(0deg)} 50%{transform:translate(-1px,-1px) rotate(-1deg)} }
.buzzing { animation: buzz 0.15s infinite; box-shadow: 0 0 8px currentColor; }
@keyframes vertigoSpin { 0%,100%{transform:rotate(0deg) scale(1)} 25%{transform:rotate(6deg) scale(1.05)} 75%{transform:rotate(-6deg) scale(1.05)} }
.vertigo-active { animation: vertigoSpin 4s ease-in-out infinite; transform-origin: center center; }

/* Sprite area */
.css-pixel-art {
flex: 0 1 auto;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
max-height: 28vh;
min-height: 60px;
}
.boss-sprite-img {
max-width: 100%;
max-height: 100%;
object-fit: contain;
border-radius: 10px;
border: 2px solid #8B7355;
transition: filter 0.3s;
}
.boss-sprite-img.rage-glow {
filter: brightness(1.3) saturate(1.5);
border-color: #CC3333;
box-shadow: 0 0 20px rgba(204,51,51,0.5);
}

/* Juice animations */
.screen-fade-in { animation: screenFadeIn 0.4s ease-out; }
@keyframes screenFadeIn { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }
.boss-entrance { animation: bossEntrance 0.8s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bossEntrance { 0%{transform:scale(0) rotate(-10deg);opacity:0} 60%{transform:scale(1.15) rotate(3deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
.boss-hit { animation: bossHit 0.3s ease-out; }
@keyframes bossHit { 0%{filter:brightness(3) saturate(0)} 100%{filter:brightness(1) saturate(1)} }
.boss-defeat { animation: bossDefeat 1s ease-in forwards; }
@keyframes bossDefeat { 0%{transform:scale(1);opacity:1} 30%{transform:scale(1.1);filter:brightness(2) saturate(0)} 100%{transform:scale(0) rotate(30deg);opacity:0;filter:brightness(3)} }
.damage-float {
position: absolute;
font-size: 1.3rem;
font-weight: 900;
color: #FFD700;
text-shadow: 2px 2px 0 #0d0d1a, -1px -1px 0 #0d0d1a;
pointer-events: none;
z-index: 100;
animation: floatUp 1s ease-out forwards;
}
.damage-float.heal-float { color: #66cc66; }
.damage-float.crit-float { color: #ff66ff; font-size: 1.6rem; text-shadow: 0 0 10px #ff66ff, 2px 2px 0 #0d0d1a; }
@keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 20%{transform:translateY(-10px) scale(1.3);opacity:1} 100%{transform:translateY(-60px) scale(0.8);opacity:0} }
.crit-flash { animation: critFlash 0.3s ease-out; }
@keyframes critFlash { 0%{box-shadow:inset 0 0 100px rgba(255,200,0,0.6)} 100%{box-shadow:inset 0 0 0 transparent} }

/* Title BG */
.title-bg {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
object-fit: cover;
opacity: 0.3;
pointer-events: none;
}

/* Screen BG images (victory/defeat) */
.screen-bg-img {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
object-fit: cover;
opacity: 0.35;
pointer-events: none;
border-radius: 0;
}

/* Typewriter */
.typewriter-box {
background-color: #1a1a2e;
border: 2px solid #8B7355;
border-radius: 14px;
padding: 12px;
min-height: 55px;
margin-bottom: 8px;
cursor: pointer;
line-height: 1.4;
font-size: 0.95rem;
}
.tap-prompt { animation: blink 1s infinite; font-weight: bold; color: #FFD700; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Buttons */
#action-menu, #hub-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
#hub-list { grid-template-columns: 1fr; }
.move-btn {
background-color: #1a1a2e;
color: #e8dcc8;
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, ‘Georgia’, serif;
border: 2px solid #8B7355;
border-radius: 14px;
min-height: 54px;
font-size: 13px;
font-weight: bold;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 6px;
white-space: pre-wrap;
transition: transform 0.1s, box-shadow 0.1s;
}
.move-btn:active { background-color: #8B7355; color: #0d0d1a; transform: scale(0.92) !important; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
.move-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: #CC3333; color: #CC3333; }
.move-btn.fogged-btn { opacity: 0.6; border-style: dashed; }
.move-btn.locked-up-btn { background-color: #1a0a0a; }
.move-btn.heros-roar-btn { border-color: #CC3333; color: #CC3333; background-color: #1a0a0a; grid-column: span 2; }

.gym-cleared { position: relative; }
.gym-cleared::after { content:”\2020”; position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:1.2rem; color:#FFD700; }

/* Header & containers */
.header-bar { padding: 12px 16px; border-bottom: 2px solid #8B7355; display: flex; justify-content: space-between; align-items: center; }
.scroll-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.codex-card { background-color: #1a1a2e; border: 2px solid #8B7355; border-radius: 14px; padding: 14px; }
.card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; border-bottom: 1px dashed #8B7355; padding-bottom: 6px; color: #FFD700; }

/* Tutorial */
.howto-page { background-color: #1a1a2e; border: 2px solid #FFD700; border-radius: 14px; padding: 14px; line-height: 1.5; font-size: 0.85rem; }
.howto-page h3 { color: #FFD700; margin: 0 0 8px 0; font-size: 1.1rem; border-bottom: 1px solid #8B7355; padding-bottom: 4px; }
.howto-page .howto-icon { font-size: 1.5rem; text-align: center; margin-bottom: 6px; }
.howto-page .key-concept { color: #66cc66; font-weight: bold; }
.howto-page .warning-concept { color: #CC3333; font-weight: bold; }
.howto-page .theme-concept { color: #FFD700; font-weight: bold; }
</style>

</head>
<body>
<div id="game-wrapper">

  <section id="screen-title" class="screen" style="position:relative;">
    <img id="title-bg-img" class="title-bg" src="" alt="">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; position:relative; z-index:1;">
      <h1>ARMOR<br>OF LIGHT</h1>
      <p style="color:#FFD700; font-weight:bold; font-style:italic;">Put on the Armor of God</p>
      <p style="font-size:0.8rem; color:#8B7355;">Ephesians 6:11</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; position:relative; z-index:1;">
      <button id="btn-how-to" class="move-btn" style="border-color:#FFD700; color:#FFD700;">How To Play</button>
      <button id="btn-start-normal" class="move-btn" style="border-color:#66cc66; color:#66cc66;">Faithful Mode</button>
      <button id="btn-start-warrior" class="move-btn" style="border-color:#CC3333; color:#CC3333;">Martyrdom Mode</button>
      <p id="mode-desc" style="text-align:center; font-size:0.7rem; color:#8B7355; margin:2px 0 0 0; min-height:2em;"></p>
    </div>
  </section>

  <section id="screen-howto" class="screen hidden" style="padding:0;">
    <div class="header-bar"><h2 class="header-title">How To Play</h2><button id="btn-skip-howto" class="move-btn" style="min-height:32px; padding:0 12px; border-color:#8B7355; color:#8B7355;">Skip</button></div>
    <div id="howto-content" class="scroll-container" style="gap:10px;">
      <div id="howto-pages"></div>
      <div style="display:flex; gap:8px; padding-bottom:6px;">
        <button id="btn-howto-prev" class="move-btn" style="flex:1; min-height:40px; border-color:#8B7355; color:#8B7355;">Back</button>
        <button id="btn-howto-next" class="move-btn" style="flex:1; min-height:40px; border-color:#FFD700; color:#FFD700;">Next</button>
      </div>
      <div id="howto-dots" style="text-align:center; font-size:1rem; letter-spacing:5px; color:#8B7355;"></div>
    </div>
  </section>

  <section id="screen-hub" class="screen hidden" style="padding:0;">
    <div class="header-bar"><h2 class="header-title">Choose Your Battle <span id="mode-badge" style="font-size:0.55rem; padding:2px 5px; border-radius:5px; vertical-align:middle;"></span></h2><button id="btn-hub-codex" class="move-btn" style="min-height:32px; padding:0 12px;">Book of Virtues</button></div>
    <div id="hub-list" class="scroll-container"></div>
  </section>

  <section id="screen-battle" class="screen hidden" style="overflow-y:auto;">
    <div class="enemy-hud ui-blur-target">
      <h2 id="enemy-name" style="margin:0 0 6px 0; color:#FFD700;">Boss Name</h2>
      <div class="health-bar-container"><div id="enemy-hp-fill"></div></div>
      <div id="rage-indicator">!! ENRAGED !!</div>
    </div>
    <div id="enemy-sprite" class="css-pixel-art ui-blur-target"><img id="boss-sprite-img" class="boss-sprite-img" src="" alt="Boss"></div>
    <div class="player-hud ui-blur-target">
      <div id="status-hud"></div>
      <div id="spoon-container"></div>
      <div id="reward-banner"></div>
      <div class="health-bar-container"><div id="player-hp-fill"></div></div>
    </div>
    <div id="battle-message-box" class="typewriter-box"></div>
    <div id="action-menu" class="ui-blur-target"></div>
  </section>

  <section id="screen-codex" class="screen hidden" style="padding:0;">
    <div class="header-bar"><h2 class="header-title">Book of Virtues</h2><button id="btn-close-codex" class="move-btn" style="min-height:32px; padding:0 12px;">Back</button></div>
    <div id="codex-list" class="scroll-container"></div>
  </section>

</div>

// AUDIO ENGINE
// ============================================================
let audioCtx;
let bgmInterval;
let bgmStep = 0;

const AudioEngine = {
  init: function() {
    if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
  },

  playTone: function(freq, type, duration, vol, detune) {
    vol = vol || 0.05;
    detune = detune || 0;
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (detune !== 0) osc.detune.setValueAtTime(detune, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration * 0.8);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  },

  sfx: {
    hit: function() { AudioEngine.playTone(150, 'sawtooth', 0.2, 0.1); },
    heal: function() {
      AudioEngine.playTone(400, 'triangle', 0.1, 0.05);
      setTimeout(function() { AudioEngine.playTone(600, 'triangle', 0.2, 0.05); }, 100);
    },
    spoonPop: function() { AudioEngine.playTone(800, 'square', 0.1, 0.04); },
    wipe: function() { AudioEngine.playTone(500, 'sine', 0.3, 0.08); AudioEngine.playTone(520, 'sine', 0.3, 0.08); },
    lock: function() { AudioEngine.playTone(200, 'sawtooth', 0.1, 0.08); AudioEngine.playTone(150, 'sawtooth', 0.2, 0.08); },
    gaslight: function() { AudioEngine.playTone(600, 'sine', 0.5, 0.06); AudioEngine.playTone(630, 'sine', 0.5, 0.06); },
    flare: function() { AudioEngine.playTone(1200, 'sine', 0.4, 0.05); AudioEngine.playTone(1250, 'sine', 0.4, 0.05); },
    tingle: function() {
      AudioEngine.playTone(1500, 'square', 0.05, 0.04);
      setTimeout(function() { AudioEngine.playTone(1800, 'square', 0.05, 0.04); }, 50);
      setTimeout(function() { AudioEngine.playTone(2100, 'square', 0.05, 0.04); }, 100);
    },
    miss: function() { AudioEngine.playTone(300, 'sawtooth', 0.2, 0.06); setTimeout(function() { AudioEngine.playTone(250, 'sawtooth', 0.3, 0.06); }, 150); },
    spin: function() { AudioEngine.playTone(600, 'sine', 0.1, 0.08); setTimeout(function() { AudioEngine.playTone(550, 'sine', 0.1, 0.08); }, 100); setTimeout(function() { AudioEngine.playTone(500, 'sine', 0.1, 0.08); }, 200); },
    victory: function() {
      var notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach(function(n, i) {
        setTimeout(function() { AudioEngine.playTone(n, 'triangle', 0.3, 0.08); }, i * 120);
      });
      setTimeout(function() { AudioEngine.playTone(1046.50, 'triangle', 0.6, 0.1); }, 500);
    },
    defeat: function() {
      var notes = [392.00, 349.23, 293.66, 246.94];
      notes.forEach(function(n, i) {
        setTimeout(function() { AudioEngine.playTone(n, 'sawtooth', 0.3, 0.06); }, i * 200);
      });
    },
    buttonTap: function() { AudioEngine.playTone(660, 'square', 0.05, 0.03); },
    starRefill: function() {
      AudioEngine.playTone(880, 'triangle', 0.1, 0.04);
      setTimeout(function() { AudioEngine.playTone(1100, 'triangle', 0.1, 0.04); }, 80);
      setTimeout(function() { AudioEngine.playTone(1320, 'triangle', 0.15, 0.05); }, 160);
    },
    critHit: function() {
      AudioEngine.playTone(200, 'sawtooth', 0.1, 0.12);
      setTimeout(function() { AudioEngine.playTone(800, 'triangle', 0.2, 0.1); }, 80);
      setTimeout(function() { AudioEngine.playTone(1200, 'triangle', 0.3, 0.08); }, 160);
    },
    rage: function() {

    this.stopBGM();
    bgmStep = 0;

    if (trackName === 'fatigue') {
      var melody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];
      var bass = [130.81, 130.81, 130.81, 130.81, 196.00, 196.00];
      bgmInterval = setInterval(function() {
        AudioEngine.playTone(bass[bgmStep % bass.length], 'square', 0.2, 0.04);
        if (bgmStep % 2 === 0) AudioEngine.playTone(melody[Math.floor(bgmStep / 2) % melody.length], 'triangle', 0.15, 0.03);
        bgmStep++;
      }, 150);
    } else if (trackName === 'fog') {
      var fogMelody = [261.63, null, 293.66, null, 329.63, 369.99, null, 415.30, 466.16, null, 369.99, null];

        if (n) AudioEngine.playTone(n, 'triangle', 0.6, 0.04);
        bgmStep++;
      }, 250);
    } else if (trackName === 'heat') {
      var heatNotes = [100, 110, 120, 130, 140, 150];
      bgmInterval = setInterval(function() {
        AudioEngine.playTone(heatNotes[bgmStep % heatNotes.length], 'sawtooth', 0.1, 0.06);
        bgmStep++;
      }, 120);
    } else if (trackName === 'stiff') {
      var stiffBass = [82.41, null, 82.41, 82.41, null, 110.00, 82.41, null];
      bgmInterval = setInterval(function() {
        var b = stiffBass[bgmStep % stiffBass.length];
        if (b) AudioEngine.playTone(b, 'square', 0.15, 0.06);
        bgmStep++;
      }, 200);
    } else if (trackName === 'doubt') {
      var doubtMelody = [329.63, 311.13, 293.66, 329.63, 349.23, 369.99];
      bgmInterval = setInterval(function() {
        AudioEngine.playTone(doubtMelody[bgmStep % doubtMelody.length], 'sine', 0.3, 0.06);
        bgmStep++;
      }, 300);
    } else if (trackName === 'blur') {
      var blurMelody = [220.00, 261.63, 293.66, 329.63, 293.66, 261.63];
      bgmInterval = setInterval(function() {
        var m = blurMelody[bgmStep % blurMelody.length];
        AudioEngine.playTone(m, 'sine', 0.3, 0.05);
        AudioEngine.playTone(m, 'sine', 0.3, 0.05, 25);
        bgmStep++;
      }, 250);
    } else if (trackName === 'static') {
      var staticMelody = [880.00, 932.33, 880.00, 1046.50];
      bgmInterval = setInterval(function() {
        AudioEngine.playTone(staticMelody[bgmStep % staticMelody.length], 'square', 0.1, 0.03);
        bgmStep++;
      }, 100);
    } else if (trackName === 'spin') {
      var spinMelody = [523.25, 493.88, 440.00, 392.00, 440.00, 493.88];

        AudioEngine.playTone(spinMelody[bgmStep % spinMelody.length], 'sine', 0.2, 0.05);
        bgmStep++;
      }, 220);
    }
  },

  stopBGM: function() {
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
  }
};

function getEnemyBaseDamage(eid, isSpecial, baseAmount) {
  if (gameMode === "warrior") return baseAmount; // No reduction
  var reductions = NORMAL_DAMAGE_REDUCTIONS[eid];
  if (!reductions) return baseAmount;
  var reduction = isSpecial ? reductions.special : reductions.normal;
  return Math.max(1, baseAmount - reduction);
}

function buildHowTo() {
  howtoCurrentPage = 0;
  renderHowToPage();
}

function renderHowToPage() {
  var container = document.getElementById('howto-pages');
  var page = HOWTO_PAGES[howtoCurrentPage];

  container.innerHTML = '<div class="howto-page">' +
    '<div class="howto-icon">' + page.icon + '</div>' +
    '<h3>' + page.title + '</h3>' +
    '<div>' + page.body + '</div>' +
    '</div>';

  // Update dots
  var dotsHtml = '';
  for (var i = 0; i < HOWTO_PAGES.length; i++) {
    dotsHtml += (i === howtoCurrentPage) ? '\u25CF' : '\u25CB';
  }
  document.getElementById('howto-dots').innerHTML = dotsHtml;

  // Update buttons
  var prevBtn = document.getElementById('btn-howto-prev');
  var nextBtn = document.getElementById('btn-howto-next');

  prevBtn.style.visibility = (howtoCurrentPage === 0) ? 'hidden' : 'visible';

  if (howtoCurrentPage === HOWTO_PAGES.length - 1) {
    nextBtn.innerText = "Got It!";
    nextBtn.style.borderColor = '#39FF14';
    nextBtn.style.color = '#39FF14';
  } else {
    nextBtn.innerText = "Next";
    nextBtn.style.borderColor = '#FF9500';
    nextBtn.style.color = '#FF9500';
  }
}

function howtoNext() {
  if (howtoCurrentPage < HOWTO_PAGES.length - 1) {
    howtoCurrentPage++;
    renderHowToPage();
  } else {
    changeScreen('screen-title');
  }
}

function howtoPrev() {
  if (howtoCurrentPage > 0) {
    howtoCurrentPage--;
    renderHowToPage();
  }
}

function startGame(mode) {
  gameMode = mode;
  AudioEngine.init();
  applyDifficultyToMoves();
  changeScreen('screen-hub');
  buildHub();
}

function changeScreen(screenId) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.add('hidden'); });
  var screen = document.getElementById(screenId);
  screen.classList.remove('hidden');
  screen.classList.remove('screen-fade-in');
  void screen.offsetWidth;
  screen.classList.add('screen-fade-in');
}

function triggerJuice(elementId, className) {
  var el = document.getElementById(elementId);
  if (!el) return;
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
}

function showDamageFloat(text, targetId, cssClass) {
  var target = document.getElementById(targetId);
  if (!target) return;
  var rect = target.getBoundingClientRect();
  var wrapper = document.getElementById('game-wrapper');
  var wrapperRect = wrapper.getBoundingClientRect();
  var floater = document.createElement('div');
  floater.classList.add('damage-float');
  if (cssClass) floater.classList.add(cssClass);
  floater.innerText = text;
  floater.style.left = (rect.left - wrapperRect.left + rect.width / 2 - 20) + 'px';
  floater.style.top = (rect.top - wrapperRect.top) + 'px';
  wrapper.appendChild(floater);
  setTimeout(function() { if (floater.parentNode) floater.parentNode.removeChild(floater); }, 1100);
}

function setThemeColor(color, dim) {
  var root = document.documentElement;
  // Apply color to elements that need it dynamically
  document.getElementById('enemy-name').style.color = color;
  document.getElementById('enemy-sprite').style.color = color;
  document.getElementById('enemy-sprite').style.textShadow = '0 0 10px ' + color;

  // Header bars
  var headers = document.querySelectorAll('.header-bar');
  headers.forEach(function(h) { h.style.borderColor = color; });

  // Hub title
  var hubTitle = document.querySelectorAll('.header-title');
  hubTitle.forEach(function(t) { t.style.color = color; });

  // Spoon container border
  document.getElementById('spoon-container').style.borderColor = dim;

  // Spoon icons color
  var spoons = document.querySelectorAll('.spoon-icon:not(.empty)');
  spoons.forEach(function(s) { s.style.backgroundColor = color; });

  // Tap prompt color
  var tapPrompts = document.querySelectorAll('.tap-prompt');
  tapPrompts.forEach(function(tp) { tp.style.color = color; });
}

// HUB LOGIC (with clear indicators and reward labels)

function buildHub() {
  var list = document.getElementById('hub-list');
  list.innerHTML = '';

  // Update mode badge
  var badge = document.getElementById('mode-badge');
  if (gameMode === 'warrior') {
    badge.innerText = 'WARRIOR';
    badge.style.border = '1px solid #FF8C00';
    badge.style.color = '#FF8C00';
  } else {
    badge.innerText = 'NORMAL';
    badge.style.border = '1px solid #39FF14';
    badge.style.color = '#39FF14';
  }

  Object.keys(suiteLevels).forEach(function(id) {
    var lvl = suiteLevels[id];
    var btn = document.createElement('button');
    btn.classList.add('move-btn');
    btn.style.borderColor = lvl.color;
    btn.style.color = lvl.color;

    var isCleared = player.clearedGyms.indexOf(parseInt(id)) !== -1;
    var labelText = lvl.title;
    if (isCleared) {
      btn.classList.add('gym-cleared');
      labelText += '\n' + lvl.rewardDesc;
    }
    btn.innerText = labelText;

    btn.onclick = function() { initLevel(id); };
    list.appendChild(btn);
  });
}

// ============================================================
// COMBAT INITIALIZATION
// ============================================================
function initLevel(lvlId) {
  currentLevelData = suiteLevels[lvlId];

  // Set Theme
  setThemeColor(currentLevelData.color, currentLevelData.dim);

  // Set Entities
  player.maxHp = currentLevelData.playerStart.hp;
  player.hp = player.maxHp;
  player.maxGrace = GAME_CONFIG.defaultMaxGrace - player.spoonPenalty;
  player.maxGrace = Math.max(3, player.maxSpoons); // Floor at 3 so game stays playable
  previousGrace = player.spoons = player.maxSpoons;
  player.pushThroughUses = 0; // Reset per-battle counter

  // Build move list: base moves + any bonus moves earned from previous clears
  player.unlockedMoves = currentLevelData.playerStart.moves.slice();

  // FEATURE 3: Add bonus moves from cleared gyms (no duplicates)
  player.bonusMoves.forEach(function(moveId) {
    if (player.unlockedMoves.indexOf(moveId) === -1) {
      player.unlockedMoves.push(moveId);
    }
  });

  // FEATURE 4: Leap of Faith is always available
  if (player.unlockedMoves.indexOf('heros_roar') === -1) {
    player.unlockedMoves.push('heros_roar');
  }

  // Deep copy enemy to avoid mutating source data
  enemy = JSON.parse(JSON.stringify(currentLevelData.enemy));

  // Apply difficulty overrides (Warrior mode reverts to original stats)
  applyDifficultyToLevel(parseInt(lvlId));

  // Clear Statuses
  status = { fogged: 0, foggedMoveId: null, overheated: 0, locked: 0, masked: 0, blurred: 0, numb: 0, vertigo: 0 };
  document.getElementById('screen-battle').classList.remove('vertigo-active');
  document.getElementById('rage-indicator').style.display = 'none';
  toggleBlurEffect();

  // Set UI Details
  document.getElementById('enemy-name').innerText = enemy.name;
  var spriteImg = document.getElementById('boss-sprite-img');
  if (BOSS_SPRITES[lvlId]) {
    spriteImg.src = BOSS_SPRITES[lvlId];
    spriteImg.alt = enemy.name;
    spriteImg.style.display = 'block';
    spriteImg.classList.remove('rage-glow');
    spriteImg.classList.remove('boss-defeat');
    spriteImg.classList.remove('boss-entrance');
    void spriteImg.offsetWidth;
    spriteImg.classList.add('boss-entrance');
  } else {
    spriteImg.style.display = 'none';
    document.getElementById('enemy-sprite').innerText = enemy.sprite;
  }

  // Show reward banner if bonus moves active, or penalty warning
  var rewardBanner = document.getElementById('reward-banner');
  var bannerParts = [];
  if (player.bonusMoves.length > 0) {
    var moveNames = player.bonusMoves.map(function(mid) {
      return moveLibrary[mid] ? moveLibrary[mid].label : mid;
    });
    bannerParts.push("Bonus: " + moveNames.join(", "));
  }
  if (player.spoonPenalty > 0) {
    bannerParts.push("Overuse penalty: -" + player.spoonPenalty + " max Grace");
    rewardBanner.style.color = '#FF8C00';
    rewardBanner.style.borderColor = '#FF8C00';
    rewardBanner.style.backgroundColor = 'rgba(255, 140, 0, 0.05)';
  } else {
    rewardBanner.style.color = '#FFD700';
    rewardBanner.style.borderColor = '#FFD700';
    rewardBanner.style.backgroundColor = 'rgba(255, 215, 0, 0.05)';
  }
  if (bannerParts.length > 0) {
    rewardBanner.innerText = bannerParts.join(" | ");
    rewardBanner.style.display = 'block';
  } else {
    rewardBanner.style.display = 'none';
  }

  changeScreen('screen-battle');
  isPlayerTurn = false;
  AudioEngine.startBGM(currentLevelData.track);
  buildActionMenu();
  updateUI();
  uiShowMessage(currentLevelData.intro, 'battle-message-box', function() { isPlayerTurn = true; });
}

function buildActionMenu() {
  var menu = document.getElementById('action-menu');
  menu.innerHTML = '';
  player.unlockedMoves.forEach(function(moveId) {
    var moveData = moveLibrary[moveId];
    if (!moveData) return;
    var btn = document.createElement('button');
    btn.classList.add('move-btn');
    btn.setAttribute('data-move', moveId);

    // Leap of Faith gets special styling
    if (moveId === 'heros_roar') {
      btn.classList.add('heros-roar-btn');
    }

    var currentCost = getMoveCost(moveId);
    var costText = "";
    if (moveId === 'heros_roar') {
      var hpCost = Math.max(1, Math.floor(player.maxHp * GAME_CONFIG.pushThroughHpCostPercent));
      costText = "\n(-" + hpCost + " HP)";
    } else if (currentCost > 0) {
      costText = "\n(-" + currentCost + " Stars)";
    }
    btn.innerText = moveData.displayName + " " + costText;

    btn.onclick = function() { if (isPlayerTurn && !btn.disabled) { AudioEngine.sfx.buttonTap(); executeTurn(moveId); } };
    menu.appendChild(btn);
  });
}

function getMoveCost(moveId) {
  var moveData = moveLibrary[moveId];
  if (!moveData) return 0;
  if (moveId === 'heros_roar') return 0; // Leap of Faith costs HP, not spoons
  var cost = moveData.cost;
  if (status.locked > 0 && moveData.type === "attack") {
    cost += GAME_CONFIG.lockedExtraSpoonCost;
  }
  return cost;
}

// ============================================================
// FEATURE 4: PUSH THROUGH — Comeback Mechanic
// ============================================================
function getPushThroughPower() {
  // Scale from basePower at full HP to maxPower at near-death
  var hpRatio = player.hp / player.maxHp;
  var missingRatio = 1 - hpRatio; // 0 at full, ~1 at near-death
  var power = GAME_CONFIG.pushThroughBasePower + (GAME_CONFIG.pushThroughMaxPower - GAME_CONFIG.pushThroughBasePower) * missingRatio;
  return Math.floor(power);
}

function canPushThrough() {
  var hpCost = Math.max(1, Math.floor(player.maxHp * GAME_CONFIG.pushThroughHpCostPercent));
  return player.hp > hpCost; // Must survive the cost
}

// ============================================================
// BATTLE LOGIC
// ============================================================
function executeTurn(moveId) {
  isPlayerTurn = false;
  var move = moveLibrary[moveId];
  var currentCost = getMoveCost(moveId);

  // Masked check — can't spend spoons you can't see
  if (status.masked > 0 && moveId !== 'heros_roar' && player.spoons < currentCost) {
    uiShowMessage("You attempt to push through, but you are completely out of energy! You must rest.", 'battle-message-box', function() {
      status.masked = 0;
      updateUI();
      enemyTurn();
    });
    return;
  }

  // Leap of Faith HP cost + overuse penalty
  if (moveId === 'heros_roar') {
    if (!canPushThrough()) {
      uiShowMessage("You don't have enough HP to push through safely!", 'battle-message-box', function() {
        isPlayerTurn = true;
      });
      return;
    }
    var hpCost = Math.max(1, Math.floor(player.maxHp * GAME_CONFIG.pushThroughHpCostPercent));
    player.hp -= hpCost;
    player.pushThroughUses++;
    triggerJuice('player-hp-fill', 'flash-hp');

    // Overuse penalty: permanently lose spoons for the session
    if (player.pushThroughUses > GAME_CONFIG.pushThroughPenaltyThreshold) {
      var penaltyAmount = GAME_CONFIG.pushThroughPenaltySpoons;
      player.spoonPenalty += penaltyAmount;
      player.maxGrace = Math.max(3, GAME_CONFIG.defaultMaxGrace - player.spoonPenalty);
      if (player.spoons > player.maxSpoons) player.spoons = player.maxSpoons;
      AudioEngine.sfx.lock();
    }
  } else {
    player.spoons -= currentCost;
  }

  // Vertigo Miss Check
  if (status.vertigo > 0 && move.type === "attack" && moveId !== "resurrection_light" && moveId !== "heros_roar" && Math.random() < GAME_CONFIG.vertigoMissChance) {
    uiShowMessage("Gabriel tries to use " + move.label + ". But everything is spinning! You miss!", 'battle-message-box', function() {
      AudioEngine.sfx.miss();
      decrementStatuses();
      enemyTurn();
    });
    updateUI();
    return;
  }

  applyMoveEffects(moveId, function() {
    if (enemy.hp <= 0) { triggerVictory(); return; }
    checkRagePhase(function() {
      decrementStatuses();
      enemyTurn();
    });
  });
  updateUI();
}

function decrementStatuses() {
  if (status.fogged > 0) { status.fogged--; if (status.fogged === 0) status.foggedMoveId = null; }
  if (status.locked > 0) status.locked--;
  if (status.masked > 0) status.masked--;
  if (status.blurred > 0) { status.blurred--; if (status.blurred === 0) toggleBlurEffect(); }
  if (status.numb > 0) status.numb--;
  if (status.vertigo > 0) { status.vertigo--; if (status.vertigo === 0) document.getElementById('screen-battle').classList.remove('vertigo-active'); }
  updateStatusHUD();
}

function applyMoveEffects(moveId, onComplete) {
  var move = moveLibrary[moveId];
  var textOut = "Gabriel uses " + move.label + ". ";

  // Status Clears
  if (moveId === "wake_up_call") { status.fogged = 0; status.foggedMoveId = null; }
  if (moveId === "temperance_blade") { status.overheated = 0; textOut += "The poison is purged by temperance! "; }
  if (moveId === "peace_covenant") { status.locked = 0; textOut += "The chains of wrath are broken by peace! "; }
  if (moveId === "humility_strike" && status.masked > 0) { status.masked = 0; textOut += "Humility shatters the mirror of pride! "; }
  if (moveId === "contentment_shield") { status.blurred = 0; toggleBlurEffect(); textOut += "Gratitude dispels the venom of envy! "; }
  if (moveId === "chastity_ward") { status.numb = 0; textOut += "Chastity banishes the confusion of lust! "; }
  if (moveId === "resurrection_light") { status.vertigo = 0; document.getElementById('screen-battle').classList.remove('vertigo-active'); textOut += "The light of hope pierces the despair! "; }

  if (moveId === "heros_roar") {
    // FEATURE 4: Comeback mechanic
    var power = getPushThroughPower();
    var levelCalc = (2 * enemy.level) / 5 + 2;
    var baseDamage = Math.floor((levelCalc * power) / 50) + 2;
    var totalDamage = Math.max(1, baseDamage + Math.floor(Math.random() * GAME_CONFIG.baseCritRange) - Math.floor(GAME_CONFIG.baseCritRange / 2));
    if (status.blurred > 0) totalDamage = Math.floor(totalDamage * GAME_CONFIG.damageReductionOnBlur);
    enemy.hp = Math.max(0, enemy.hp - totalDamage);
    var hpPercent = Math.round((1 - player.hp / player.maxHp) * 100);
    textOut += "By faith alone! Gabriel strikes for " + totalDamage + " damage!";

    // Overuse warning and penalty messages
    if (player.pushThroughUses > GAME_CONFIG.pushThroughPenaltyThreshold) {
      textOut += " Oh no! Gabriel's faith wavers! You lost 1 max Grace forever!";
    } else if (player.pushThroughUses === GAME_CONFIG.pushThroughPenaltyThreshold) {
      textOut += " Careful! Presuming on grace has consequences. Further leaps will cost Grace forever!";
    }

    AudioEngine.sfx.pushThrough();
    triggerJuice('enemy-hp-fill', 'flash-hp');
    triggerJuice('boss-sprite-img', 'boss-hit');
    showDamageFloat('-' + totalDamage, 'enemy-sprite');
  } else if (move.type === "attack") {
    var levelCalcA = (2 * enemy.level) / 5 + 2;
    var baseDamageA = Math.floor((levelCalcA * move.power) / 50) + 2;
    var totalDamageA = Math.max(1, baseDamageA + Math.floor(Math.random() * GAME_CONFIG.baseCritRange) - Math.floor(GAME_CONFIG.baseCritRange / 2));
    if (status.blurred > 0 && moveId !== "contentment_shield") totalDamageA = Math.floor(totalDamageA * GAME_CONFIG.damageReductionOnBlur);
    var isCrit = Math.random() < 0.15;
    if (isCrit) totalDamageA = Math.floor(totalDamageA * 1.5);
    enemy.hp = Math.max(0, enemy.hp - totalDamageA);
    if (isCrit) {
      textOut += "SUPER HIT! " + totalDamageA + " damage!";
      AudioEngine.sfx.critHit();
      triggerJuice('game-wrapper', 'crit-flash');
      showDamageFloat('SUPER! -' + totalDamageA, 'enemy-sprite', 'crit-float');
    } else {
      textOut += "It dealt " + totalDamageA + " damage.";
      showDamageFloat('-' + totalDamageA, 'enemy-sprite');
    }
    AudioEngine.sfx.hit();
    triggerJuice('enemy-hp-fill', 'flash-hp');
    triggerJuice('boss-sprite-img', 'boss-hit');
  } else if (move.type === "recovery") {
    var healAmount = Math.floor(player.maxHp * move.healPercent);
    player.hp = Math.min(player.maxHp, player.hp + healAmount);
    player.spoons = Math.min(player.maxSpoons, player.spoons + move.spoonHeal);
    if (healAmount > 0) {
      textOut += "Recovered " + healAmount + " HP.";
      showDamageFloat('+' + healAmount, 'player-hp-fill', 'heal-float');
    }
    if (move.spoonHeal > 0) {
      if (healAmount === 0) textOut += "Gained " + move.spoonHeal + " Grace.";
      AudioEngine.sfx.starRefill();
    } else {
      AudioEngine.sfx.heal();
    }
  }

  updateStatusHUD();
  uiShowMessage(textOut, 'battle-message-box', onComplete);
}

// ============================================================
// FEATURE 2: RAGE PHASE
// ============================================================
function checkRagePhase(onComplete) {
  if (enemy.enraged || enemy.hp <= 0) { onComplete(); return; }
  var hpRatio = enemy.hp / enemy.maxHp;
  if (hpRatio <= GAME_CONFIG.rageHpThreshold) {
    enemy.enraged = true;
    document.getElementById('rage-indicator').style.display = 'block';
    var rageSprite = document.getElementById('boss-sprite-img');
    if (rageSprite) rageSprite.classList.add('rage-glow');
    AudioEngine.sfx.rage();
    triggerJuice('screen-battle', 'shake');
    uiShowMessage(currentLevelData.rageText, 'battle-message-box', onComplete);
  } else {
    onComplete();
  }
}

function getEnemySpecialChance() {
  if (enemy.enraged) return GAME_CONFIG.rageSpecialChance;
  return GAME_CONFIG.defaultSpecialChance;
}

function getEnemyDamageMultiplier() {
  if (enemy.enraged) return GAME_CONFIG.rageDamageMultiplier;
  return 1.0;
}

// ============================================================
// ENEMY TURN
// ============================================================
function enemyTurn() {
  var textOut = "";
  var damage = 0;
  var eid = enemy.id;
  var dmgMult = getEnemyDamageMultiplier();

  // Overheat active damage
  if (status.overheated > 0) {
    var heatDmg = GAME_CONFIG.overheatTickDamage;
    player.hp = Math.max(0, player.hp - heatDmg);
    textOut += "The poison drains " + heatDmg + " HP! ";
    triggerJuice('player-hp-fill', 'flash-hp');
  }

  var triggerSpecial = (Math.random() < getEnemySpecialChance());

  if (eid === "greed") {
    damage = Math.floor((Math.floor(Math.random() * 3) + 4) * dmgMult);
    textOut += "Greed hurls golden coins at you for " + damage + " damage. ";
    if (player.spoons > 0) { player.spoons--; textOut += "It makes you lose 1 Grace! "; }
    AudioEngine.sfx.hit();
  }
  else if (eid === "gluttony") {
    if (triggerSpecial && status.fogged === 0) {
      status.fogged = GAME_CONFIG.fogDuration;
      // Only fog non-zero-cost moves to avoid trivial fog on Rest
      var foggableTargets = player.unlockedMoves.filter(function(mid) {
        return moveLibrary[mid] && moveLibrary[mid].cost > 0 && mid !== 'heros_roar';
      });
      if (foggableTargets.length > 0) {
        status.foggedMoveId = foggableTargets[Math.floor(Math.random() * foggableTargets.length)];
      }
      damage = Math.floor(3 * dmgMult);
      textOut += "Gluttony spews poison for " + damage + " damage. The poison seeps into your veins! ";
      AudioEngine.sfx.wipe();
    } else {
      damage = Math.floor(8 * dmgMult);
      textOut += "Gluttony slams the feast table for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "wrath") {
    if (triggerSpecial && status.overheated === 0) {
      status.overheated = GAME_CONFIG.defaultStatusDuration;
      damage = Math.floor(4 * dmgMult);
      textOut += "Wrath unleashes hellfire! Chains of anger bind you! It deals " + damage + " damage. ";
      AudioEngine.sfx.flare();
    } else {
      damage = Math.floor(10 * dmgMult);
      textOut += "Wrath swings its burning fists for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "sloth") {
    if (triggerSpecial && status.locked === 0) {
      status.locked = GAME_CONFIG.defaultStatusDuration;
      damage = Math.floor(getEnemyBaseDamage(eid, true, 7) * dmgMult);
      textOut += "Sloth drains your will for " + damage + " damage. Your limbs grow heavy! Attacks cost +1 Grace. ";
      AudioEngine.sfx.lock();
    } else {
      damage = Math.floor(getEnemyBaseDamage(eid, false, 14) * dmgMult);
      textOut += "Sloth smothers you in darkness for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "pride") {
    if (triggerSpecial && status.masked === 0) {
      status.masked = GAME_CONFIG.defaultStatusDuration;
      damage = Math.floor(getEnemyBaseDamage(eid, true, 8) * dmgMult);
      textOut += "Shadow uses 'But You Look Fine' for " + damage + " damage. You cannot see your own weakness! ";
      AudioEngine.sfx.gaslight();
    } else {
      damage = Math.floor(getEnemyBaseDamage(eid, false, 15) * dmgMult);
      textOut += "Pride strikes with vanity for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "envy") {
    if (triggerSpecial && status.blurred === 0) {
      status.blurred = GAME_CONFIG.defaultStatusDuration;
      toggleBlurEffect();
      damage = Math.floor(getEnemyBaseDamage(eid, true, 10) * dmgMult);
      textOut += "Envy sprays venom for " + damage + " damage. Jealousy clouds your vision! ";
      AudioEngine.sfx.flare();
    } else {
      damage = Math.floor(getEnemyBaseDamage(eid, false, 18) * dmgMult);
      textOut += "Envy coils and strikes for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "lust") {
    if (triggerSpecial && status.numb === 0) {
      status.numb = GAME_CONFIG.defaultStatusDuration;
      damage = Math.floor(getEnemyBaseDamage(eid, true, 12) * dmgMult);
      textOut += "Lust whispers confusion for " + damage + " damage. Your mind is clouded with false desires! ";
      AudioEngine.sfx.tingle();
    } else {
      damage = Math.floor(getEnemyBaseDamage(eid, false, 20) * dmgMult);
      textOut += "Lust lashes with illusions for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }
  else if (eid === "acedia") {
    if (triggerSpecial && status.vertigo === 0) {
      status.vertigo = GAME_CONFIG.defaultStatusDuration;
      document.getElementById('screen-battle').classList.add('vertigo-active');
      damage = Math.floor(getEnemyBaseDamage(eid, true, 14) * dmgMult);
      textOut += "Acedia pulls you toward the void for " + damage + " damage. Hope itself begins to fade! ";
      AudioEngine.sfx.spin();
    } else {
      damage = Math.floor(getEnemyBaseDamage(eid, false, 22) * dmgMult);
      textOut += "Acedia crushes you with despair for " + damage + " damage. ";
      AudioEngine.sfx.hit();
    }
  }

  player.hp = Math.max(0, player.hp - damage);
  if (status.masked === 0) { triggerJuice('player-hp-fill', 'flash-hp'); showDamageFloat('-' + damage, 'player-hp-fill'); }
  triggerJuice('screen-battle', 'shake');

  updateUI();
  updateStatusHUD();

  uiShowMessage(textOut, 'battle-message-box', function() {
    if (player.hp <= 0) { triggerDefeat(); return; }
    var pt = player.spoons === 0 ? "You are out of energy. Rest or Leap of Faith." : "What will Gabriel do?";
    if (status.masked > 0) pt = "Pride blinds you! Tread carefully!";
    uiShowMessage(pt, 'battle-message-box', function() { isPlayerTurn = true; });
  });
}

// ============================================================
// FEATURE 1: STATUS EFFECT HUD
// ============================================================
function updateStatusHUD() {
  var hud = document.getElementById('status-hud');
  hud.innerHTML = '';

  var statusKeys = ['fogged', 'overheated', 'locked', 'masked', 'blurred', 'numb', 'vertigo'];
  statusKeys.forEach(function(key) {
    if (status[key] > 0) {
      var display = STATUS_DISPLAY[key];
      var badge = document.createElement('div');
      badge.classList.add('status-badge');
      badge.style.borderColor = currentLevelData ? currentLevelData.color : '#9988cc';
      badge.innerHTML = '<span class="status-emoji">' + display.emoji + '</span>' +
                        '<span class="status-label">' + display.label + '</span>' +
                        '<span class="status-turns">' + status[key] + 't</span>';
      hud.appendChild(badge);
    }
  });
}

// ============================================================
// UI UPDATES
// ============================================================
function updateUI() {
  var hpFill = document.getElementById('player-hp-fill');
  var spoonContainer = document.getElementById('spoon-container');
  var enemyHpFill = document.getElementById('enemy-hp-fill');

  enemyHpFill.style.width = Math.max(0, (enemy.hp / enemy.maxHp) * 100) + '%';

  // Enemy HP color shifts to red when enraged
  if (enemy.enraged) {
    enemyHpFill.style.backgroundColor = '#FF8C00';
  } else {
    enemyHpFill.style.backgroundColor = '#39FF14';
  }

  spoonContainer.innerHTML = '';

  if (status.masked > 0) {
    hpFill.style.width = '100%';
    hpFill.classList.add('masked-bar');
    spoonContainer.classList.add('masked-container');
    spoonContainer.classList.remove('low-energy');
    for (var mi = 0; mi < player.maxSpoons; mi++) {
      var mIcon = document.createElement('div');
      mIcon.classList.add('spoon-icon', 'masked-spoon');
      spoonContainer.appendChild(mIcon);
    }
  } else {
    hpFill.style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
    hpFill.classList.remove('masked-bar');
    spoonContainer.classList.remove('masked-container');
    for (var si = 0; si < player.maxSpoons; si++) {
      var sIcon = document.createElement('div');
      sIcon.classList.add('spoon-icon');
      if (currentLevelData) {
        sIcon.style.backgroundColor = currentLevelData.color;
      }
      if (si >= player.spoons) {
        sIcon.classList.add('empty');
        sIcon.style.backgroundColor = '#9988cc';
        if (si < previousGrace && player.spoons !== 0) {
          sIcon.classList.add('just-spent');
          AudioEngine.sfx.spoonPop();
        }
      } else if (si >= previousGrace) {
        sIcon.classList.add('star-refill');
      }
      spoonContainer.appendChild(sIcon);
    }
    if (player.spoons <= GAME_CONFIG.lowEnergyThreshold && player.spoons > 0) {
      spoonContainer.classList.add('low-energy');
    } else {
      spoonContainer.classList.remove('low-energy');
    }
  }

  previousGrace = player.spoons;

  // Update buttons
  var moveButtons = document.querySelectorAll('#action-menu .move-btn');
  moveButtons.forEach(function(btn) {
    var moveId = btn.getAttribute('data-move');
    var moveData = moveLibrary[moveId];
    if (!moveData) return;

    // Recalculate cost text
    var currentCost = getMoveCost(moveId);
    var costText = "";
    if (moveId === 'heros_roar') {
      var ptHpCost = Math.max(1, Math.floor(player.maxHp * GAME_CONFIG.pushThroughHpCostPercent));
      var ptPower = getPushThroughPower();
      var usesLeft = Math.max(0, GAME_CONFIG.pushThroughPenaltyThreshold - player.pushThroughUses);
      if (usesLeft > 0) {
        costText = "\n(-" + ptHpCost + " HP | Pow:" + ptPower + " | " + usesLeft + " safe)";
      } else {
        costText = "\n(-" + ptHpCost + " HP | Pow:" + ptPower + " | OVERUSE!)";
      }
    } else if (currentCost > 0) {
      costText = "\n(-" + currentCost + " Stars)";
    }
    btn.innerText = moveData.displayName + " " + costText;

    // Numbness (Shuffle buttons)
    if (status.numb > 0) {
      btn.style.order = Math.floor(Math.random() * 10);
      btn.classList.add('buzzing');
    } else {
      btn.style.order = 0;
      btn.classList.remove('buzzing');
    }

    // Fogged
    if (status.fogged > 0 && moveId === status.foggedMoveId) {
      btn.innerText = "[ ? ? ? ]";
      btn.disabled = true;
      btn.classList.add('fogged-btn');
    } else {
      btn.classList.remove('fogged-btn');
    }

    // Locked Up
    if (status.locked > 0 && moveData.type === "attack" && moveId !== 'heros_roar') {
      btn.classList.add('locked-up-btn');
    } else {
      btn.classList.remove('locked-up-btn');
    }

    // Cost Enforcer
    if (moveId === 'heros_roar') {
      // Leap of Faith disabled if not enough HP
      btn.disabled = !canPushThrough();
    } else if (status.masked === 0 && player.spoons < currentCost && !(status.fogged > 0 && moveId === status.foggedMoveId)) {
      btn.disabled = true;
    } else if (!(status.fogged > 0 && moveId === status.foggedMoveId)) {
      btn.disabled = false;
    }
  });

  updateStatusHUD();
}

function toggleBlurEffect() {
  var targets = document.querySelectorAll('.ui-blur-target');
  if (status.blurred > 0) targets.forEach(function(el) { el.classList.add('blurred-ui'); });
  else targets.forEach(function(el) { el.classList.remove('blurred-ui'); });
}

// ============================================================
// WIN / LOSS
// ============================================================
function triggerVictory() {
  isPlayerTurn = false;
  AudioEngine.stopBGM();
  AudioEngine.sfx.victory();
  document.getElementById('action-menu').innerHTML = '';
  document.getElementById('rage-indicator').style.display = 'none';
  var victorySprite = document.getElementById('boss-sprite-img');
  if (victorySprite) {
    victorySprite.classList.remove('rage-glow');
    victorySprite.classList.add('boss-defeat');
  }

  var lvlId = currentLevelData.id;

  // Codex unlock
  if (player.unlockedCodex.indexOf(lvlId) === -1) {
    player.unlockedCodex.push(lvlId);
  }

  // FEATURE 3: Session persistence — mark gym as cleared and unlock bonus move
  var isFirstClear = (player.clearedGyms.indexOf(lvlId) === -1);
  if (isFirstClear) {
    player.clearedGyms.push(lvlId);
    var bonusMoveId = GAME_CONFIG.bonusMovePerGym[lvlId];
    if (bonusMoveId && player.bonusMoves.indexOf(bonusMoveId) === -1) {
      player.bonusMoves.push(bonusMoveId);
    }
  }

  var victoryText = "The sin is vanquished! God's light prevails through you, Gabriel!";
  if (isFirstClear && GAME_CONFIG.bonusMovePerGym[lvlId]) {
    var unlockedMove = moveLibrary[GAME_CONFIG.bonusMovePerGym[lvlId]];
    if (unlockedMove) {
      victoryText += " NEW MOVE UNLOCKED: " + unlockedMove.label + "!";
    }
  }

  uiShowMessage(victoryText, 'battle-message-box', function() {
    var proceedBtn = document.createElement('button');
    proceedBtn.innerText = "Return to Chapel";
    proceedBtn.classList.add('move-btn');
    proceedBtn.style.gridColumn = "span 2";
    proceedBtn.onclick = function() { changeScreen('screen-hub'); buildHub(); };
    document.getElementById('action-menu').appendChild(proceedBtn);
  });
}

function triggerDefeat() {
  isPlayerTurn = false;
  AudioEngine.stopBGM();
  AudioEngine.sfx.defeat();
  document.getElementById('action-menu').innerHTML = '';
  document.getElementById('rage-indicator').style.display = 'none';
  var defeatSprite = document.getElementById('boss-sprite-img');
  if (defeatSprite) defeatSprite.classList.remove('rage-glow');
  status.masked = 0;
  updateUI();

  // Partial codex unlock on defeat (name revealed, no description)
  var lvlId = currentLevelData.id;
  if (player.unlockedCodex.indexOf(lvlId) === -1) {
    player.unlockedCodex.push(-lvlId); // Negative = partial unlock
  }

  uiShowMessage("Gabriel falls, but God's mercy endures. Rise again, faithful knight.", 'battle-message-box', function() {
    var retryBtn = document.createElement('button');
    retryBtn.innerText = "Pray and Rise Again";
    retryBtn.classList.add('move-btn');
    retryBtn.style.gridColumn = "span 2";
    retryBtn.onclick = function() { changeScreen('screen-hub'); buildHub(); };
    document.getElementById('action-menu').appendChild(retryBtn);
  });
}

// ============================================================
// TYPEWRITER
// ============================================================
function uiShowMessage(text, boxId, onComplete) {
  currentScreenBox = document.getElementById(boxId);
  currentOnComplete = onComplete;
  textQueue = text.match(/.*?[.!?](?:\s|$)|.+/g) || [text];
  currentSentenceIndex = 0;
  currentScreenBox.innerHTML = '';
  startTypingSentence();
}

function startTypingSentence() {
  if (currentSentenceIndex >= textQueue.length) {
    if (currentOnComplete) currentOnComplete();
    return;
  }
  isTyping = true;
  isWaitingForTap = false;
  currentCharIndex = 0;
  var sentence = textQueue[currentSentenceIndex];
  if (typeInterval) clearInterval(typeInterval);
  typeInterval = setInterval(function() {
    currentScreenBox.innerHTML += sentence.charAt(currentCharIndex);
    currentCharIndex++;
    if (currentCharIndex >= sentence.length) {
      clearInterval(typeInterval);
      isTyping = false;
      if (currentSentenceIndex < textQueue.length - 1) {
        isWaitingForTap = true;
        currentScreenBox.innerHTML += '<span class="tap-prompt"> \u25BC</span>';
      } else {
        if (currentOnComplete) currentOnComplete();
      }
    }
  }, GAME_CONFIG.typewriterSpeed);
}

function handleBoxTap() {
  if (!currentScreenBox) return;
  if (isTyping) {
    clearInterval(typeInterval);
    isTyping = false;
    currentScreenBox.innerHTML += textQueue[currentSentenceIndex].substring(currentCharIndex);
    if (currentSentenceIndex < textQueue.length - 1) {
      isWaitingForTap = true;
      currentScreenBox.innerHTML += '<span class="tap-prompt"> \u25BC</span>';
    } else {
      if (currentOnComplete) currentOnComplete();
    }
  } else if (isWaitingForTap) {
    isWaitingForTap = false;
    currentSentenceIndex++;
    currentScreenBox.innerHTML = currentScreenBox.innerHTML.replace('<span class="tap-prompt"> \u25BC</span>', ' ');
    startTypingSentence();
  }
}

// ============================================================
// CODEX (with partial unlocks from defeats)
// ============================================================
function openCodex() {
  changeScreen('screen-codex');
  var list = document.getElementById('codex-list');
  list.innerHTML = '';
  Object.keys(suiteLevels).forEach(function(id) {
    var lvl = suiteLevels[id];
    var card = document.createElement('div');
    card.classList.add('codex-card');

    var fullUnlock = player.unlockedCodex.indexOf(parseInt(id)) !== -1;
    var partialUnlock = player.unlockedCodex.indexOf(-parseInt(id)) !== -1;

    if (fullUnlock) {
      card.style.borderColor = lvl.color;
      card.innerHTML = '<div class="card-title" style="border-color:' + lvl.dim + '">' + lvl.enemy.name + '</div><div class="card-desc">' + lvl.desc + '</div>';
    } else if (partialUnlock) {
      card.style.borderColor = lvl.dim;
      card.style.opacity = '0.7';
      card.innerHTML = '<div class="card-title" style="border-color:' + lvl.dim + '">' + lvl.enemy.name + '</div><div class="card-desc" style="color:#9988cc;">Full data requires victory. Keep fighting.</div>';
    } else {
      card.innerHTML = '<div class="card-title">???</div><div class="card-desc">Data Encrypted. Defeat Sin ' + id + ' to unlock.</div>';
    }
    list.appendChild(card);
  });
}
